services:
  intercom:
    image: ${IMAGE}
    container_name: home-intercom
    restart: unless-stopped
    ports:
      - "8764:8764"
    volumes:
      # SSH key for SCP to HA
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      # rooms.json editable without rebuild
      - ../src/rooms.json:/app/rooms.json:ro
    environment:
      - HA_HOST=<YOUR_HA_IP>
      - HA_WWW=/config/www/intercom/
      - N8N_HOOK=https://<YOUR_N8N_HOST>/webhook/intercom/play
    network_mode: host
