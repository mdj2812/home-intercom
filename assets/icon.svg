  <circle cx="256" cy="256" r="160" fill="none" stroke="#fff" stroke-width="1" opacity="0.1"/>
  <!-- Dot matrix pattern -->
  <g fill="#fff">
    <rect x="248" y="88" width="16" height="16"/>
    <rect x="288" y="108" width="16" height="16" opacity="0.7"/>
    <rect x="320" y="148" width="16" height="16" opacity="0.5"/>
    <rect x="340" y="196" width="16" height="16" opacity="0.4"/>
    <rect x="340" y="248" width="16" height="16" opacity="0.4"/>
    <rect x="320" y="296" width="16" height="16" opacity="0.5"/>
    <rect x="288" y="336" width="16" height="16" opacity="0.7"/>
    <rect x="248" y="356" width="16" height="16"/>
    <rect x="208" y="336" width="16" height="16" opacity="0.7"/>
    <rect x="176" y="296" width="16" height="16" opacity="0.5"/>
    <rect x="156" y="248" width="16" height="16" opacity="0.4"/>
    <rect x="156" y="196" width="16" height="16" opacity="0.4"/>
    <rect x="176" y="148" width="16" height="16" opacity="0.5"/>
