<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f0f0f">

<title>家庭广播</title>
<script src="/static/i18n.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f0f0f;
  color: #fff;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ──── Layout ──── */
.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 16px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 0 12px;
}
.header-right {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.header h1 {
  font-size: 1rem;
  font-weight: 600;
  color: #ccc;
  letter-spacing: 0.02em;
}
.header .ver {
  font-size: 0.7rem;
  color: #444;
}
.header .hint {
  font-size: 0.8rem;
  color: #555;
  margin-top: 4px;
}
#lang-toggle {
  background: none;
  border: 1px solid #444;
  border-radius: 4px;
  color: #888;
  font-size: 0.65rem;
  padding: 2px 6px;
  cursor: pointer;
  transition: color .2s, border-color .2s;
}
#lang-toggle:hover { color: #ccc; border-color: #666; }

/* ──── Grid ──── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* ──── Broadcast card (全部) ──── */
.broadcast-card {
  grid-column: 1 / -1;
  margin-bottom: 6px;
  display: grid !important;
  grid-template-columns: auto auto;
  grid-template-rows: auto auto;
  justify-content: space-around;
  align-items: center;
  gap: 4px 16px;
  padding: 12px 16px;
}
.broadcast-card .room-header {
  grid-column: 1;
  grid-row: 1;
  font-size: 1rem;
}
.broadcast-card .ptt-wrap {
  grid-column: 2;
  grid-row: 1;
  width: 70px; height: 70px;
}
.broadcast-card .ptt-btn {
  width: 100%; height: 100%;
}
.broadcast-card .status {
  grid-column: 2;
  grid-row: 2;
  text-align: center;
  margin-top: 4px;
}

/* ──── Room card ──── */
.room-card {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 16px 12px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  transition: background .3s, box-shadow .3s;
  border: 1px solid #2a2a2a;
}

/* ──── Room header ──── */
.room-header {
  font-size: 0.9rem;
  font-weight: 500;
  color: #999;
  display: flex;
  align-items: center;
  gap: 6px;
}
.room-icon {
  font-size: 1.1rem;
}
.room-header .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #444;
  transition: background .3s;
}

/* ──── PTT Button ──── */
.ptt-wrap {
  position: relative;
  width: 120px; height: 120px;
}
.ptt-btn {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: none;
  background: #252525;
  box-shadow: 0 6px 16px rgba(0,0,0,.3), inset 0 1px 2px rgba(255,255,255,.06);
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: transform .15s ease, background .3s, box-shadow .3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ptt-btn:active {
  transform: scale(0.96);
}

/* ──── Ripple waves ──── */
.waves {
  position: absolute;
  inset: -16px;
  z-index: 1;
}
.waves::before,
.waves::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid #33d17a;
  opacity: 0;
}

/* ──── Sound bars icon ──── */
.bars {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  justify-content: center;
  height: 36px;
  transition: opacity .25s, transform .25s;
}
.bars span {
  width: 5px;
  background: #666;
  border-radius: 10px;
  transition: background .3s, height .2s;
}
.bars span:nth-child(1) { height: 14px; }
.bars span:nth-child(2) { height: 28px; }
.bars span:nth-child(3) { height: 20px; }
.bars span:nth-child(4) { height: 10px; }

/* ──── Big checkmark (sent state) ──── */
.checkmark {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  font-size: 3.4rem;
  font-weight: 700;
  color: #fff;
  animation: popIn .4s cubic-bezier(0.34,1.56,0.64,1);
}
.sent .checkmark {
  display: flex;
}
.sent .bars {
  opacity: 0;
}
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ──── Status text ──── */
.status {
  font-size: 0.75rem;
  color: #555;
  height: 1.4em;
  line-height: 1.4em;
  text-align: center;
  transition: color .3s;
}

/* ══════════════════════════════════════
   STATES
   ══════════════════════════════════════ */

/* recording */
.room-card.recording {
  border-color: rgba(51,209,122,.4);
  box-shadow: 0 0 24px rgba(51,209,122,.08);
}
.room-card.recording .ptt-btn {
  background: #2a5038;
  transform: scale(0.95);
  box-shadow: inset 0 4px 14px rgba(0,0,0,.35);
}
.room-card.recording .status { color: #33d17a; }
.room-card.recording .bars span { background: #33d17a; }

/* wave animation */
.room-card.recording .waves::before {
  animation: ripple 2s ease-out infinite;
}
.room-card.recording .waves::after {
  animation: ripple 2s ease-out infinite 1s;
}
@keyframes ripple {
  0%   { transform: scale(1); opacity: .5; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* bar bounce */
.room-card.recording .bars span {
  animation: bounce .6s ease-in-out infinite alternate;
}
.room-card.recording .bars span:nth-child(2) { animation-delay: .1s; }
.room-card.recording .bars span:nth-child(3) { animation-delay: .2s; }
.room-card.recording .bars span:nth-child(4) { animation-delay: .3s; }
@keyframes bounce {
  from { transform: scaleY(.6); }
  to   { transform: scaleY(1.3); }
}

/* sending */
.room-card.sending {
  border-color: rgba(51,209,122,.35);
  box-shadow: 0 0 24px rgba(51,209,122,.08);
}
.room-card.sending .ptt-btn {
  background: #2a5038;
}
.room-card.sending .bars { opacity: 0; }
.room-card.sending .checkmark { display: none; }
.room-card.sending .ptt-btn::after {
  content: "";
  position: absolute;
  inset: -3px;
  border: 3px solid rgba(51,209,122,.2);
  border-top-color: #33d17a;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
.room-card.sending .status { color: #f0a030; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* sent */
.room-card.sent {
  border-color: rgba(51,209,122,.35);
}
.room-card.sent .ptt-btn {
  background: #2a5038;
}
.room-card.sent .status { color: #33d17a; }

/* broadcast card accent */
.broadcast-card .room-header { color: #f0a030; font-weight: 600; }
.broadcast-card .dot { display: none; }
.broadcast-card.recording .status { color: #f0a030; }
.broadcast-card.recording .ptt-btn { background: #503a20; }
.broadcast-card.sent .ptt-btn { background: #503a20; }
.broadcast-card .waves::before,
.broadcast-card .waves::after { border-color: #f0a030; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1 id="app-title">📢 家庭广播</h1>
      <p class="hint" id="app-hint">按住录音 · 松开发送</p>
    </div>
    <div class="header-right">
      <button id="lang-toggle" onclick="I18N.toggleLang()">EN</button>
      <span class="ver" id="ver">…</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const GRID = document.getElementById('grid');
const STREAM_URL = '/stream/start';
const PCM_SAMPLE_RATE = 16000;
const PCM_CHANNELS = 1;
const SCRIPT_NODE_SIZE = 1024;  // buffer size per onaudioprocess callback

let audioCtx = null;
let scriptProc = null;
let micStream = null;
let currentTarget = '';
let currentCard = null;
let pcmChunks = [];          // Float32→Int16 PCM chunk queue
let resolvePull = null;      // resolve pending ReadableStream pull()
let abortCtrl = null;          // AbortController for the streaming fetch
let ROOM_NAMES = {};

// Room icon mapping (extensible, falls back to 📢)
const ROOM_ICONS = {
  all:     '📢',
  living:  '🛋️',
  bedroom: '🛏️',
  study:   '📚',
  cinema:  '🎬',
};
function roomIcon(target) {
  return ROOM_ICONS[target] || '🔊';
}

function makeCard(target, name, isBroadcast) {
  const card = document.createElement('div');
  card.className = 'room-card' + (isBroadcast ? ' broadcast-card' : '');
  card.id = 'card-' + target;

  card.innerHTML = `
    <div class="room-header">
      <span class="room-icon">${roomIcon(target)}</span>
      <span${isBroadcast ? ' data-i18n="broadcastAll"' : ` data-room-name="${target}"`}>${name}</span>
      <span class="dot"></span>
    </div>
    <div class="ptt-wrap">
      <div class="waves"></div>
      <button class="ptt-btn">
        <div class="bars">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="checkmark">✓</div>
      </button>
    </div>
    <div class="status">${I18N.t('statusReady')}</div>
  `;

  const btn = card.querySelector('.ptt-btn');

  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    btn.setPointerCapture(e.pointerId);
    startStreaming(target, card);
  });
  btn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    stopStreaming();
  });
  btn.addEventListener('lostpointercapture', (e) => {
    if (abortCtrl) stopStreaming();
  });
  btn.addEventListener('touchstart', e => e.preventDefault());
  btn.addEventListener('contextmenu', e => e.preventDefault());

  return card;
}

async function loadRooms() {
  // Expose room data for i18n language switching
  window._ROOM_DATA = {};
  window._ROOM_DATA['all'] = { name: I18N.t('broadcastAll'), name_en: 'Broadcast All' };
  ROOM_NAMES['all'] = I18N.t('broadcastAll');
  GRID.appendChild(makeCard('all', I18N.t('broadcastAll'), true));

  try {
    const resp = await fetch('/rooms.json');
    const rooms = await resp.json();
    for (const [key, room] of Object.entries(rooms)) {
      window._ROOM_DATA[key] = room;
      ROOM_NAMES[key] = room.name;
      GRID.appendChild(makeCard(key, room.name, false));
    }
  } catch (e) {
    const firstStatus = GRID.querySelector('.status');
    if (firstStatus) firstStatus.textContent = I18N.t('statusLoadFailed');
  }
}

function setCardState(card, state, msg) {
  ['recording','sending','sent'].forEach(c => card.classList.remove(c));
  if (state) card.classList.add(state);
  card.querySelector('.status').textContent = msg;
}

// ── Real-time PCM streaming (issue #7) ──────────────────────────

/** Float32Array [-1,+1] → Int16Array little-endian bytes */
function float32ToPCM(input) {
  const pcm = new Int16Array(input.length);
  for (let i = 0; i < input.length; i++) {
    const s = Math.max(-1, Math.min(1, input[i]));
    pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
  }
  return new Uint8Array(pcm.buffer);
}

function cleanupAudio() {
  if (scriptProc) {
    scriptProc.disconnect();
    scriptProc = null;
  }
  if (audioCtx && audioCtx.state !== 'closed') {
    audioCtx.close().catch(() => {});
    audioCtx = null;
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  pcmChunks = [];
  if (abortCtrl) {
    abortCtrl.abort();
    abortCtrl = null;
  }
  // Resolve any pending Pull to unblock ReadableStream
  if (resolvePull) {
    resolvePull();
    resolvePull = null;
  }
}

async function startStreaming(target, card) {
  currentTarget = target;
  currentCard = card;
  cleanupAudio();

  try {
    // AudioContext at 16kHz to match server-side WAV header
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: PCM_SAMPLE_RATE });
    const source = audioCtx.createMediaStreamSource(micStream);

    // ScriptProcessorNode to access raw PCM samples
    // Note: deprecated but still the most portable way to get raw PCM.
    // AudioWorklet would be preferred but requires a separate file / CORS-safe URL.
    scriptProc = audioCtx.createScriptProcessor(SCRIPT_NODE_SIZE, PCM_CHANNELS, PCM_CHANNELS);
    scriptProc.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      pcmChunks.push(float32ToPCM(input));
      // Wake up the ReadableStream pull() if it's waiting
      if (resolvePull) {
        const r = resolvePull;
        resolvePull = null;
        r();
      }
    };

    source.connect(scriptProc);
    // Create a silent gain node to keep the audio graph alive
    // without creating mic→speaker feedback loop.
    const silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;
    scriptProc.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    // Ensure AudioContext is running (may be suspended by browser policy)
    if (audioCtx.state === 'suspended') {
      await audioCtx.resume();
    }

    // Log audio context state for debugging
    const _ac = audioCtx;
    console.log('[stream] AudioContext state:', _ac.state, 'sampleRate:', _ac.sampleRate);

    // Build a ReadableStream that feeds PCM chunks to the HTTP request body
    const streamBody = new ReadableStream({
      pull(controller) {
        if (pcmChunks.length > 0) {
          controller.enqueue(pcmChunks.shift());
          return Promise.resolve();
        }
        // No data yet — wait for onaudioprocess to push + resolve
        return new Promise(resolve => { resolvePull = resolve; });
      },
      cancel() {
        cleanupAudio();
      }
    });

    abortCtrl = new AbortController();
    setCardState(card, 'recording', I18N.t('statusRecording'));

    const resp = await fetch(STREAM_URL + '?target=' + target, {
      method: 'POST',
      body: streamBody,
      headers: { 'Content-Type': 'application/octet-stream' },
      duplex: 'half',
      signal: abortCtrl.signal,
    });

    if (resp.ok) {
      setCardState(card, 'sent', I18N.t('statusSent'));
    } else {
      setCardState(card, '', I18N.t('statusFailed') + ' ' + resp.status);
    }
  } catch (e) {
    if (e.name === 'AbortError') return; // normal — stream cancelled
    setCardState(card, '', I18N.t('micError') + e.message);
  } finally {
    cleanupAudio();
    setTimeout(() => {
      if (card) setCardState(card, '', I18N.t('statusReady'));
    }, 1500);
  }
}

function stopStreaming() {
  // Closing the AudioContext will cause ScriptProcessor to stop firing,
  // which will unblock the ReadableStream pull() → stream ends → fetch completes.
  cleanupAudio();
}

// ── Speaker status polling ──────────────────────────────────────

async function pollSpeakerStatus() {
  try {
    const resp = await fetch('/rooms/status');
    const status = await resp.json();
    for (const [key, online] of Object.entries(status)) {
      const dot = document.querySelector(`#card-${key} .dot`);
      if (!dot) continue;
      dot.style.background = online ? '#33d17a' : '#444';
      dot.style.boxShadow = online ? '0 0 4px #33d17a' : 'none';
    }
  } catch (e) { /* ignore */ }
}

loadRooms();
setTimeout(pollSpeakerStatus, 1000);
setInterval(pollSpeakerStatus, 30000);

// Show version number
fetch('/version').then(r => r.json()).then(d => {
  document.getElementById('ver').textContent = d.version;
}).catch(() => {
  document.getElementById('ver').textContent = '';
});
</script>
</body>
</html>
