<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f0f0f">

<title>家庭广播</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f0f0f;
  color: #fff;
  touch-action: manipulation;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ──── Layout ──── */
.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 16px;
}
.header {
  text-align: left;
  padding: 8px 0 12px;
}
.header h1 {
  font-size: 1rem;
  font-weight: 600;
  color: #ccc;
  letter-spacing: 0.02em;
}
.header .hint {
  font-size: 0.8rem;
  color: #555;
  margin-top: 4px;
}

/* ──── Grid ──── */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

/* ──── Broadcast card (全部) ──── */
.broadcast-card {
  grid-column: 1 / -1;
  margin-bottom: 6px;
  flex-direction: row;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 8px 16px;
  padding: 12px 16px;
}
.broadcast-card .room-header {
  flex: 0 0 auto;
  font-size: 1rem;
}
.broadcast-card .ptt-wrap {
  width: 70px; height: 70px;
  flex: 0 0 auto;
}
.broadcast-card .ptt-btn {
  width: 100%; height: 100%;
}
.broadcast-card .status {
  flex: 1 0 100%;
  text-align: left;
  margin-top: 2px;
}

/* ──── Room card ──── */
.room-card {
  background: #1a1a1a;
  border-radius: 20px;
  padding: 16px 12px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
  transition: background .3s, box-shadow .3s;
  border: 1px solid #2a2a2a;
}

/* ──── Room header ──── */
.room-header {
  font-size: 0.9rem;
  font-weight: 500;
  color: #999;
  display: flex;
  align-items: center;
  gap: 6px;
}
.room-icon {
  font-size: 1.1rem;
}
.room-header .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #444;
  transition: background .3s;
}

/* ──── PTT Button ──── */
.ptt-wrap {
  position: relative;
  width: 120px; height: 120px;
}
.ptt-btn {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: none;
  background: #252525;
  box-shadow: 0 6px 16px rgba(0,0,0,.3), inset 0 1px 2px rgba(255,255,255,.06);
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: transform .15s ease, background .3s, box-shadow .3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ptt-btn:active {
  transform: scale(0.96);
}

/* ──── Ripple waves ──── */
.waves {
  position: absolute;
  inset: -16px;
  z-index: 1;
}
.waves::before,
.waves::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 2px solid #33d17a;
  opacity: 0;
}

/* ──── Sound bars icon ──── */
.bars {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  justify-content: center;
  height: 36px;
  transition: opacity .25s, transform .25s;
}
.bars span {
  width: 5px;
  background: #666;
  border-radius: 10px;
  transition: background .3s, height .2s;
}
.bars span:nth-child(1) { height: 14px; }
.bars span:nth-child(2) { height: 28px; }
.bars span:nth-child(3) { height: 20px; }
.bars span:nth-child(4) { height: 10px; }

/* ──── Big checkmark (sent state) ──── */
.checkmark {
  display: none;
  position: absolute;
  inset: 0;
  align-items: center;
  justify-content: center;
  font-size: 3.4rem;
  font-weight: 700;
  color: #fff;
  animation: popIn .4s cubic-bezier(0.34,1.56,0.64,1);
}
.sent .checkmark {
  display: flex;
}
.sent .bars {
  opacity: 0;
}
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.15); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* ──── Status text ──── */
.status {
  font-size: 0.75rem;
  color: #555;
  height: 1.4em;
  line-height: 1.4em;
  text-align: center;
  transition: color .3s;
}

/* ══════════════════════════════════════
   STATES
   ══════════════════════════════════════ */

/* recording */
.room-card.recording {
  border-color: rgba(51,209,122,.4);
  box-shadow: 0 0 24px rgba(51,209,122,.08);
}
.room-card.recording .ptt-btn {
  background: #2a5038;
  transform: scale(0.95);
  box-shadow: inset 0 4px 14px rgba(0,0,0,.35);
}
.room-card.recording .status { color: #33d17a; }
.room-card.recording .bars span { background: #33d17a; }

/* wave animation */
.room-card.recording .waves::before {
  animation: ripple 2s ease-out infinite;
}
.room-card.recording .waves::after {
  animation: ripple 2s ease-out infinite 1s;
}
@keyframes ripple {
  0%   { transform: scale(1); opacity: .5; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* bar bounce */
.room-card.recording .bars span {
  animation: bounce .6s ease-in-out infinite alternate;
}
.room-card.recording .bars span:nth-child(2) { animation-delay: .1s; }
.room-card.recording .bars span:nth-child(3) { animation-delay: .2s; }
.room-card.recording .bars span:nth-child(4) { animation-delay: .3s; }
@keyframes bounce {
  from { transform: scaleY(.6); }
  to   { transform: scaleY(1.3); }
}

/* sending */
.room-card.sending {
  border-color: rgba(51,209,122,.35);
  box-shadow: 0 0 24px rgba(51,209,122,.08);
}
.room-card.sending .ptt-btn {
  background: #2a5038;
}
.room-card.sending .bars { opacity: 0; }
.room-card.sending .checkmark { display: none; }
.room-card.sending .ptt-btn::after {
  content: "";
  position: absolute;
  inset: -3px;
  border: 3px solid rgba(51,209,122,.2);
  border-top-color: #33d17a;
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
.room-card.sending .status { color: #f0a030; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* sent */
.room-card.sent {
  border-color: rgba(51,209,122,.35);
}
.room-card.sent .ptt-btn {
  background: #2a5038;
}
.room-card.sent .status { color: #33d17a; }

/* broadcast card accent */
.broadcast-card .room-header { color: #f0a030; font-weight: 600; }
.broadcast-card .dot { display: none; }
.broadcast-card.recording .status { color: #f0a030; }
.broadcast-card.recording .ptt-btn { background: #503a20; }
.broadcast-card.sent .ptt-btn { background: #503a20; }
.broadcast-card .waves::before,
.broadcast-card .waves::after { border-color: #f0a030; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📢 家庭广播</h1>
    <p class="hint">按住录音 · 松开发送</p>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const GRID = document.getElementById('grid');
const CONVERT_URL = '/convert';
let mediaRecorder = null;
let audioChunks = [];
let currentTarget = '';
let currentCard = null;
let ROOM_NAMES = {};

// Room icon mapping (extensible, falls back to 📢)
const ROOM_ICONS = {
  all:     '📢',
  living:  '🛋️',
  bedroom: '🛏️',
  study:   '📚',
  cinema:  '🎬',
};
function roomIcon(target) {
  return ROOM_ICONS[target] || '🔊';
}

function makeCard(target, name, isBroadcast) {
  const card = document.createElement('div');
  card.className = 'room-card' + (isBroadcast ? ' broadcast-card' : '');
  card.id = 'card-' + target;

  card.innerHTML = `
    <div class="room-header">
      <span class="room-icon">${roomIcon(target)}</span>
      <span>${name}</span>
      <span class="dot"></span>
    </div>
    <div class="ptt-wrap">
      <div class="waves"></div>
      <button class="ptt-btn">
        <div class="bars">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="checkmark">✓</div>
      </button>
    </div>
    <div class="status">准备好</div>
  `;

  const btn = card.querySelector('.ptt-btn');

  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    startRecording(target, card);
  });
  btn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    stopRecording();
  });
  btn.addEventListener('pointerleave', (e) => {
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  });
  btn.addEventListener('touchstart', e => e.preventDefault());
  btn.addEventListener('contextmenu', e => e.preventDefault());

  return card;
}

async function loadRooms() {
  ROOM_NAMES['all'] = '全部广播';
  GRID.appendChild(makeCard('all', '全部广播', true));

  try {
    const resp = await fetch('/rooms.json');
    const rooms = await resp.json();
    for (const [key, room] of Object.entries(rooms)) {
      ROOM_NAMES[key] = room.name;
      GRID.appendChild(makeCard(key, room.name, false));
    }
  } catch (e) {
    GRID.querySelector('.status').textContent = '加载失败';
  }
}

function setCardState(card, state, msg) {
  ['recording','sending','sent'].forEach(c => card.classList.remove(c));
  if (state) card.classList.add(state);
  card.querySelector('.status').textContent = msg;
}

async function startRecording(target, card) {
  currentTarget = target;
  currentCard = card;
  audioChunks = [];

  if (!mediaRecorder) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => sendAudio();
    } catch (e) {
      setCardState(card, '', '❌ 麦克风: ' + e.message);
      return;
    }
  }

  mediaRecorder.start();
  setCardState(card, 'recording', '录音中…');
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    setCardState(currentCard, 'sending', '发送中…');
  }
}

async function sendAudio() {
  const blob = new Blob(audioChunks, { type: 'audio/webm' });

  try {
    const resp = await fetch(CONVERT_URL + '?target=' + currentTarget, {
      method: 'POST', body: blob, headers: { 'Content-Type': 'audio/webm' }
    });

    if (resp.ok) {
      setCardState(currentCard, 'sent', '已发送');
    } else {
      setCardState(currentCard, '', '失败 ' + resp.status);
    }
  } catch (e) {
    setCardState(currentCard, '', '网络错误');
  }

  setTimeout(() => {
    if (currentCard) setCardState(currentCard, '', '准备好');
  }, 1500);
}

async function pollSpeakerStatus() {
  try {
    const resp = await fetch('/rooms/status');
    const status = await resp.json();
    for (const [key, online] of Object.entries(status)) {
      const dot = document.querySelector(`#card-${key} .dot`);
      if (!dot) continue;
      dot.style.background = online ? '#33d17a' : '#444';
      dot.style.boxShadow = online ? '0 0 4px #33d17a' : 'none';
    }
  } catch (e) { /* ignore */ }
}

loadRooms();
setTimeout(pollSpeakerStatus, 1000);
setInterval(pollSpeakerStatus, 30000);
</script>
</body>
</html>
