<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f0f0f">

<title>家庭广播</title>
<script>
// Set initial title from saved language before i18n.js loads
(function(){
  var lang = localStorage.getItem("intercom-lang") || "";
  var isEn = lang === "en" || (!lang && (navigator.language || "zh-CN").split("-")[0] !== "zh");
  document.title = isEn ? "Home Intercom" : "家庭广播";
})();
</script>
<script src="/static/i18n.js"></script>
<link rel="stylesheet" href="/static/intercom.css">
</head>
<body>

<div class="container">
  <div class="header">
    <div>
      <h1 id="app-title">📢 家庭广播</h1>
      <p class="hint" id="app-hint">按住录音 · 松开发送</p>
    </div>
    <div class="header-right">
      <button id="lang-toggle" onclick="I18N.toggleLang()">EN</button>
      <span class="ver" id="ver">…</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
// --- Shared with ha_client.py EntityStatus / PlayError ---
const EntityStatus = { ONLINE: "online", UNAVAILABLE: "unavailable", NO_PLAY_MEDIA: "no_play_media" };
const PlayError   = { PLAY_FAILED: "play_failed", MA_FAILED: "ma_failed" };
const UNAVAILABLE_CLASS = "unavailable";

const GRID = document.getElementById('grid');
const RECORD_URL = '/record';
// PCM target rate fetched from /version on startup
let TARGET_RATE = 16000;  // fallback, overwritten by server

let mediaRecorder = null;
let audioChunks = [];
let currentTarget = '';
let currentCard = null;
let ROOM_NAMES = {};

// Room icon mapping (extensible, falls back to 📢)
const ROOM_ICONS = {
  all:     '📢',
  living:  '🛋️',
  bedroom: '🛏️',
  study:   '📚',
  cinema:  '🎬',
};
function roomIcon(target) {
  return ROOM_ICONS[target] || '🔊';
}

function makeCard(target, name, isBroadcast) {
  const card = document.createElement('div');
  card.className = 'room-card' + (isBroadcast ? ' broadcast-card' : '');
  card.id = 'card-' + target;

  card.innerHTML = `
    <div class="room-header">
      <span class="room-icon">${roomIcon(target)}</span>
      <span${isBroadcast ? ' data-i18n="broadcastAll"' : ` data-room-name="${target}"`}>${name}</span>
      <span class="dot"></span>
    </div>
    <div class="ptt-wrap">
      <div class="waves"></div>
      <button class="ptt-btn">
        <div class="bars">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="checkmark">✓</div>
      </button>
    </div>
    <div class="status">${I18N.t('statusReady')}</div>
  `;

  const btn = card.querySelector('.ptt-btn');

  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    btn.setPointerCapture(e.pointerId);
    startRecording(target, card);
  });
  btn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    stopRecording();
  });
  btn.addEventListener('lostpointercapture', () => {
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  });
  btn.addEventListener('touchstart', e => e.preventDefault());
  btn.addEventListener('contextmenu', e => e.preventDefault());

  return card;
}

async function loadRooms() {
  // Expose room data for i18n language switching
  window._ROOM_DATA = {};
  window._ROOM_DATA['all'] = { name: I18N.t('broadcastAll'), name_en: 'Broadcast All' };
  ROOM_NAMES['all'] = I18N.t('broadcastAll');
  GRID.appendChild(makeCard('all', I18N.t('broadcastAll'), true));

  try {
    const resp = await fetch('/rooms.json');
    const rooms = await resp.json();
    for (const [key, room] of Object.entries(rooms)) {
      window._ROOM_DATA[key] = room;
      ROOM_NAMES[key] = room.name;
      GRID.appendChild(makeCard(key, room.name, false));
    }
  } catch (e) {
    const firstStatus = GRID.querySelector('.status');
    if (firstStatus) firstStatus.textContent = I18N.t('statusLoadFailed');
  }
}

function setCardState(card, state, msg) {
  ['recording','sending','sent'].forEach(c => card.classList.remove(c));
  if (state) card.classList.add(state);
  card.querySelector('.status').textContent = msg;
}

async function startRecording(target, card) {
  currentTarget = target;
  currentCard = card;
  audioChunks = [];

  if (card.classList.contains(UNAVAILABLE_CLASS)) return;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null;
      processAndSend();
    };
    mediaRecorder.start();
    setCardState(card, 'recording', I18N.t('statusRecording'));
  } catch (e) {
    setCardState(card, '', I18N.t('micError') + e.message);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    setCardState(currentCard, 'sending', I18N.t('statusSending'));
  }
}

async function processAndSend() {
  const webm = new Blob(audioChunks, { type: 'audio/webm' });
  let sentCurrent = true;

  try {
    // Decode webm/opus → AudioBuffer (browser's native decoder)
    const arrayBuf = await webm.arrayBuffer();
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuf = await actx.decodeAudioData(arrayBuf);
    const srcRate = audioBuf.sampleRate;
    const srcData = audioBuf.getChannelData(0);
    actx.close();

    // Resample to TARGET_RATE using OfflineAudioContext
    const duration = srcData.length / srcRate;
    const offlineCtx = new OfflineAudioContext(1, Math.ceil(duration * TARGET_RATE), TARGET_RATE);
    const bufferSrc = offlineCtx.createBufferSource();
    const offlineBuf = offlineCtx.createBuffer(1, srcData.length, srcRate);
    offlineBuf.copyToChannel(srcData, 0);
    bufferSrc.buffer = offlineBuf;
    bufferSrc.connect(offlineCtx.destination);
    bufferSrc.start(0);

    const rendered = await offlineCtx.startRendering();
    const resampled = rendered.getChannelData(0);

    // Float32 → Int16 PCM
    const pcm = new Int16Array(resampled.length);
    for (let i = 0; i < resampled.length; i++) {
      const s = Math.max(-1, Math.min(1, resampled[i]));
      pcm[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }

    const resp = await fetch(RECORD_URL + '?target=' + currentTarget + '&rate=' + TARGET_RATE, {
      method: 'POST', body: new Blob([new Uint8Array(pcm.buffer, 0, pcm.byteLength)]),
    });

    if (resp.ok) {
      const data = await resp.json();
      const errors = data.errors || [];
      sentCurrent = true;  // show "sent" unless current card is an error card
      if (errors.length > 0) {
        // Map entity → room key for card lookup
        const entityToKey = {};
        for (const [key, room] of Object.entries(window._ROOM_DATA || {})) {
          if (room.entity) entityToKey[room.entity] = key;
        }
        // Show error on each skipped room's card
        for (const e of errors) {
          const key = entityToKey[e.entity];
          if (!key) continue;
          const card = document.getElementById('card-' + key);
          if (!card) continue;
          if (card === currentCard) sentCurrent = false;
          // Turn dot red
          const dot = card.querySelector('.dot');
          if (dot) dot.className = 'dot dot-error';
          const msg = (e.error === EntityStatus.UNAVAILABLE || e.error === PlayError.PLAY_FAILED || e.error === PlayError.MA_FAILED)
            ? I18N.t('statusUnavailable')
            : I18N.t('statusSkipped');
          setCardState(card, '', msg);
        }
      }
      if (sentCurrent) setCardState(currentCard, 'sent', I18N.t('statusSent'));
    } else {
      setCardState(currentCard, '', I18N.t('statusFailed') + ' ' + resp.status);
    }
  } catch (e) {
    setCardState(currentCard, '', I18N.t('statusNetworkError'));
    console.error('processAndSend:', e);
  }

  setTimeout(() => {
    if (currentCard && sentCurrent) setCardState(currentCard, '', I18N.t('statusReady'));
  }, 1500);
}

async function pollSpeakerStatus() {
  try {
    const resp = await fetch('/rooms/status');
    const status = await resp.json();
    for (const [key, state] of Object.entries(status)) {
      const card = document.getElementById('card-' + key);
      if (!card) continue;
      const dot = card.querySelector('.dot');
      if (state === EntityStatus.ONLINE) {
        if (dot) dot.className = 'dot dot-online';
        card.classList.remove(UNAVAILABLE_CLASS);
      } else if (state === EntityStatus.NO_PLAY_MEDIA) {
        if (dot) dot.className = 'dot dot-error';
        card.classList.add(UNAVAILABLE_CLASS);
        const st = card.querySelector('.status');
        if (st) st.textContent = I18N.t('statusSkipped');
      } else {
        // unavailable — same persistent error as no_play_media
        if (dot) dot.className = 'dot dot-error';
        card.classList.add(UNAVAILABLE_CLASS);
        const st = card.querySelector('.status');
        if (st) st.textContent = I18N.t('statusUnavailable');
      }
    }
  } catch (e) { /* ignore */ }
}

loadRooms();
setTimeout(pollSpeakerStatus, 1000);
setInterval(pollSpeakerStatus, 30000);

// Show version number + fetch server config
fetch('/version').then(r => r.json()).then(d => {
  document.getElementById('ver').textContent = d.version;
  if (d.pcm_rate) TARGET_RATE = d.pcm_rate;
}).catch(() => {
  document.getElementById('ver').textContent = '';
});
</script>
</body>
</html>
