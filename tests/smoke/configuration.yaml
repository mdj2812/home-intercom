# Minimal HA config for container smoke tests.
# Only loads essentials — no default_config to speed up boot.
homeassistant:
  name: "Smoke Test"
  unit_system: metric

frontend:
http:
  use_x_forwarded_for: true

home_intercom:
  rooms:
    test:
      name: Test Room
      entity_id: media_player.test_speaker

logger:
  default: warning
  logs:
    custom_components.home_intercom: debug
