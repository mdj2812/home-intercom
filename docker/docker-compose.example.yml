services:
  intercom:
    image: ${IMAGE}
    container_name: home-intercom
    restart: unless-stopped
    volumes:
      # Audio files served by Flask (no SCP)
      - ./audio:/data/audio
      # rooms.json editable without rebuild
      - ../src/rooms.json:/app/rooms.json:ro
    environment:
      - HA_HOST=<YOUR_HA_IP>
      - N8N_HOOK=https://<YOUR_N8N_HOST>/webhook/intercom/play
      - HA_TOKEN=<YOUR_HA_LONG_LIVED_TOKEN>
      - SELF_URL=http://<YOUR_NAS_IP>:8764
    network_mode: host
