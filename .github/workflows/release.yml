name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    name: Build & Attach Release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check manifest version matches tag
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/home_intercom/manifest.json'))['version'])")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: Tag version '$TAG_VERSION' does not match manifest version '$MANIFEST_VERSION'"
            exit 1
          fi
          echo "✓ Version check passed: $TAG_VERSION"

      - name: ZIP Component Dir
        run: |
          cd "${{ github.workspace }}/custom_components/home_intercom"
          zip -r home_intercom.zip ./

      - name: Upload ZIP to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/home_intercom/home_intercom.zip
          asset_name: home_intercom.zip
          tag: ${{ github.ref }}
          overwrite: true
