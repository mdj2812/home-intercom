name: Validate HA Integration

on:
  push:
    branches: [main]
    paths:
      - "custom_components/**"
      - "tests/smoke/**"
  pull_request:
    branches: [main]
    paths:
      - "custom_components/**"
      - "tests/smoke/**"

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate with hassfest
        uses: home-assistant/actions/hassfest@master

  syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check syntax
        run: |
          python3 -m py_compile custom_components/home_intercom/__init__.py
          python3 -m py_compile custom_components/home_intercom/const.py

      - name: Validate JSON
        run: |
          python3 -c "import json; json.load(open('custom_components/home_intercom/manifest.json'))"

      - name: Validate YAML
        run: |
          python3 -c "
          import sys
          try:
              import yaml
          except ImportError:
              print('PyYAML not installed, skipping YAML validation')
              sys.exit(0)
          yaml.safe_load(open('custom_components/home_intercom/services.yaml'))
          print('services.yaml: OK')
          "

  smoke-test:
    name: HA Container Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: tests/smoke/Dockerfile.ha-test
          tags: home-intercom-ha-test:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run smoke test
        run: bash tests/smoke/run.sh --skip-build
