name: Code Quality

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      AUDIO_DIR: /tmp/audio

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: |
          pip install -r src/requirements.txt
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: |
          ruff check src/ tests/ custom_components/
          ruff format --check src/ tests/ custom_components/

      - name: Stylelint CSS
        run: |
          npm install -g stylelint@17 stylelint-config-standard@40
          stylelint custom_components/home_intercom/static/*.css

      - name: Pytest with coverage
        run: |
          python -m pytest tests/ -v --tb=short \
            --cov=src \
            --cov-report=term-missing

  docker-smoke:
    name: Docker Container Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          tags: home-intercom:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Docker smoke test
        run: bash tests/docker-smoke/run.sh --skip-build
