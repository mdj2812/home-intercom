name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'docker/.docker-image'
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version and pre-release status
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          else
            VERSION=$(cat docker/.docker-image)
            TAG="$VERSION"
            # Detect pre-release from version string (e.g. v2.0.0-rc1)
            case "$VERSION" in
              *-rc*|*-alpha*|*-beta*|*-pre*|*-dev*) IS_PRERELEASE="true" ;;
              *) IS_PRERELEASE="false" ;;
            esac
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Compute branch tag
        id: branch_tag
        run: |
          SAFE_TAG=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "safe_tag=$SAFE_TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            if [ "${{ steps.meta.outputs.is_prerelease }}" != "true" ]; then
              TAGS="$TAGS
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TAGS="$TAGS
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main"
            # Only tag 'latest' for stable versions on main
            if [ "${{ steps.meta.outputs.is_prerelease }}" != "true" ]; then
              TAGS="$TAGS
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            fi
          fi

          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.list }}
